<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMI HMS - Management System</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-heart-pulse"></i>
            <span>EMI HMS</span>
        </div>
        <nav class="nav-links">
            <a href="#" class="nav-item active" data-view="dashboard">
                <i class="fa-solid fa-chart-line"></i> Dashboard
            </a>
            <a href="#" class="nav-item" data-view="patients">
                <i class="fa-solid fa-user-injured"></i> Patients
            </a>
            <a href="#" class="nav-item" data-view="doctors">
                <i class="fa-solid fa-user-doctor"></i> Doctors
            </a>
            <a href="#" class="nav-item" data-view="appointments">
                <i class="fa-solid fa-calendar-check"></i> Appointments
            </a>
            <a href="#" class="nav-item" data-view="emi-plans">
                <i class="fa-solid fa-money-bill-wave"></i> EMI Plans
            </a>
            <a href="#" class="nav-item" data-view="invoices">
                <i class="fa-solid fa-file-invoice-dollar"></i> Invoices
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header class="header">
            <h1 class="header-title" id="page-title">Dashboard</h1>
            <div class="user-profile">
                <div class="avatar">
                    AD
                </div>
                <span>Admin User</span>
            </div>
        </header>

        <!-- Content Area -->
        <div id="app" class="content-area">
            <!-- Views will be injected here by JS -->
            <div class="loading">Loading...</div>
        </div>
    </main>

    <!-- Modals Container -->
    <div id="modal-container"></div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
